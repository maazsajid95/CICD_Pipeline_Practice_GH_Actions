name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linting
        run: |
          flake8 .

      - name: Run Tests
        run: |
          pytest

      - name: Run Dependency Security Scan
        run: |
          pip-audit

      - name: Build Docker Image
        run: |
          docker build -t devsecops-flask-demo .

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
            image-ref: 'devsecops-flask-demo'
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker tag devsecops-flask-demo ${{ secrets.DOCKER_USERNAME }}/devsecops-flask-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-flask-demo:latest